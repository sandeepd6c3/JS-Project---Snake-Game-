<!-- ============================ -->
<!-- 🐍 Snake Game HTML Structure -->
<!-- ============================ -->

<!DOCTYPE html>
<html lang="en">

<!-- ============================ -->
<!-- 🔹 HEAD SECTION -->
<!-- ============================ -->
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive design for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Snake Game</title>

    <!-- External CSS file -->
    <link rel="stylesheet" href="style.css">
</head>


<!-- ============================ -->
<!-- 🔹 BODY SECTION -->
<!-- ============================ -->
<body>

    <!-- ============================ -->
    <!-- 🔹 MAIN GAME CONTAINER -->
    <!-- ============================ -->
    <main>

        <!-- ============================ -->
        <!-- 🔹 GAME SECTION (INFO + BOARD) -->
        <!-- ============================ -->
        <section>

            <!-- ============================ -->
            <!-- 🔹 GAME INFO BAR -->
            <!-- ============================ -->
            <div class="infos">

                <!-- High Score Display -->
                <h3 class="info">
                    High Score:
                    <span id="high-Score">0</span>
                </h3>

                <!-- Current Score Display -->
                <h3 class="info">
                    Score:
                    <span id="score">0</span>
                </h3>

                <!-- Timer Display -->
                <h3 class="info">
                    Time:
                    <span id="time">00-00</span>
                </h3>

            </div>


            <!-- ============================ -->
            <!-- 🔹 GAME BOARD -->
            <!-- ============================ -->
            <div class="Board">
                <!-- Snake and food blocks will be generated via JavaScript -->
            </div>

        </section>
        
        <!-- ============================ -->
        <!-- 🔹 MODAL (START + GAME OVER) -->
        <!-- ============================ -->
        <div class="modal">

            <!-- 🔹 Start Game Screen -->
            <div class="start-game">
                <h3>Welcome to the snake game</h3>
                <button class="btn btn-start">Start Game</button>
            </div>

            <!-- 🔹 Game Over Screen -->
            <div class="game-over">
                <h3>Game Over</h3>
                <button class="btn btn-restart">Restart Game</button>
            </div>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
